services:
  - type: web
    name: gestionelupi
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: gestionelupi-db
          property: connectionString
      - key: APP_URL
        value: https://gestionelupi.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_ENCRYPTION_KEY
        generateValue: true
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://gestionelupi.onrender.com/api/google/callback
      - key: NEXT_PUBLIC_GOOGLE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_APP_ID
        sync: false

databases:
  - name: gestionelupi-db
    plan: free
    databaseName: gestionelupi
    user: gestionelupi
